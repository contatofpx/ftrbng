<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:absolute;inset:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:{{ bg }};overflow:hidden;">
  <div style="position:absolute;inset:0;background:{{ stripe }};"></div>
  <span style="position:relative;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:{{ fg }};text-align:center;padding:0 14px;line-height:1.5;">{{ label }}</span>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:400,&quot;height&quot;:260},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;imagem&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dark&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const tone = this.props.tone ?? 'dark';
    const dark = tone === 'dark';
    return {
      label: this.props.label ?? 'imagem',
      bg: dark ? '#221130' : '#E9E0D3',
      stripe: dark
        ? 'repeating-linear-gradient(135deg, transparent, transparent 9px, rgba(168,82,189,0.10) 9px, rgba(168,82,189,0.10) 18px)'
        : 'repeating-linear-gradient(135deg, transparent, transparent 9px, rgba(120,90,140,0.10) 9px, rgba(120,90,140,0.10) 18px)',
      fg: dark ? 'rgba(233,214,243,0.50)' : 'rgba(90,72,108,0.65)'
    };
  }
}
</script>
</body>
</html>
